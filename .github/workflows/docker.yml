name: Build Docker

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t mi-api:latest .

      - name: Test
        run: docker run mi-api:latest python -c "print('Test OK')"

      - name: Success
        run: echo "Build successful!"